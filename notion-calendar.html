<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calendar</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: #fff;
    color: #1a1a1a;
    padding: 24px;
    min-height: 100vh;
  }

  .cal {
    max-width: 380px;
    margin: 0 auto;
  }

  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 24px;
  }

  .month-label {
    font-size: 16px;
    font-weight: 500;
    letter-spacing: 0.02em;
    color: #1a1a1a;
  }

  .year-label {
    font-size: 13px;
    font-weight: 300;
    color: #888;
    margin-left: 6px;
    font-family: 'DM Mono', monospace;
  }

  .nav {
    display: flex;
    gap: 4px;
  }

  .nav button {
    width: 28px;
    height: 28px;
    border: none;
    background: none;
    cursor: pointer;
    border-radius: 6px;
    color: #888;
    font-size: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.15s, color 0.15s;
  }

  .nav button:hover {
    background: #e8f4fa;
    color: #0B6E99;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 2px;
  }

  .day-name {
    text-align: center;
    font-size: 11px;
    font-weight: 500;
    color: #bbb;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding-bottom: 10px;
    font-family: 'DM Mono', monospace;
  }

  .day {
    aspect-ratio: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 13px;
    font-weight: 400;
    color: #1a1a1a;
    border-radius: 6px;
    cursor: pointer;
    transition: background 0.12s;
    position: relative;
  }

  .day:hover:not(.empty):not(.today) {
    background: #f5f5f5;
  }

  .day.empty {
    cursor: default;
  }

  .day.other-month {
    color: #ccc;
  }

  .day.today {
    background: #0B6E99;
    color: #fff;
    font-weight: 500;
  }

  .day.weekend:not(.today) {
    color: #aaa;
  }

  .today-btn {
    display: block;
    margin: 18px auto 0;
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    font-weight: 400;
    color: #888;
    background: none;
    border: none;
    cursor: pointer;
    letter-spacing: 0.04em;
    padding: 4px 8px;
    border-radius: 4px;
    transition: color 0.15s, background 0.15s;
  }

  .today-btn:hover {
    color: #1a1a1a;
    background: #f5f5f5;
  }
</style>
</head>
<body>
<div class="cal">
  <div class="header">
    <div>
      <span class="month-label" id="month-name"></span>
      <span class="year-label" id="year-num"></span>
    </div>
    <div class="nav">
      <button id="prev" title="Previous month">&#8592;</button>
      <button id="next" title="Next month">&#8594;</button>
    </div>
  </div>
  <div class="grid" id="grid"></div>
  <button class="today-btn" id="today-btn">today</button>
</div>

<script>
  const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  const DAYS = ['Su','Mo','Tu','We','Th','Fr','Sa'];

  let now = new Date();
  let view = { year: now.getFullYear(), month: now.getMonth() };

  function render() {
    const { year, month } = view;
    document.getElementById('month-name').textContent = MONTHS[month];
    document.getElementById('year-num').textContent = year;

    const grid = document.getElementById('grid');
    grid.innerHTML = '';

    DAYS.forEach(d => {
      const el = document.createElement('div');
      el.className = 'day-name';
      el.textContent = d;
      grid.appendChild(el);
    });

    const first = new Date(year, month, 1).getDay();
    const daysInMonth = new Date(year, month + 1, 0).getDate();
    const daysInPrev = new Date(year, month, 0).getDate();

    const today = new Date();
    const isCurrentMonth = today.getFullYear() === year && today.getMonth() === month;

    for (let i = 0; i < first; i++) {
      const el = document.createElement('div');
      el.className = 'day other-month';
      el.textContent = daysInPrev - first + 1 + i;
      const dow = i;
      if (dow === 0 || dow === 6) el.classList.add('weekend');
      grid.appendChild(el);
    }

    for (let d = 1; d <= daysInMonth; d++) {
      const el = document.createElement('div');
      el.className = 'day';
      el.textContent = d;
      const dow = (first + d - 1) % 7;
      if (dow === 0 || dow === 6) el.classList.add('weekend');
      if (isCurrentMonth && d === today.getDate()) el.classList.add('today');
      grid.appendChild(el);
    }

    const total = first + daysInMonth;
    const trailing = (7 - (total % 7)) % 7;
    for (let d = 1; d <= trailing; d++) {
      const el = document.createElement('div');
      el.className = 'day other-month';
      el.textContent = d;
      const dow = (total + d - 1) % 7;
      if (dow === 0 || dow === 6) el.classList.add('weekend');
      grid.appendChild(el);
    }
  }

  document.getElementById('prev').addEventListener('click', () => {
    if (view.month === 0) { view.month = 11; view.year--; }
    else view.month--;
    render();
  });

  document.getElementById('next').addEventListener('click', () => {
    if (view.month === 11) { view.month = 0; view.year++; }
    else view.month++;
    render();
  });

  document.getElementById('today-btn').addEventListener('click', () => {
    const n = new Date();
    view = { year: n.getFullYear(), month: n.getMonth() };
    render();
  });

  render();
</script>
</body>
</html>
